<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aNother1332 - Personal Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #121212;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #1e1e1e;
            max-width: 700px;
            width: 100%;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,150,255,0.2);
            text-align: center;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0096fa;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #0096fa;
        }

        .bio {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .section {
            margin: 30px 0;
            text-align: left;
        }

        .section h2 {
            color: #0096fa;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: #0096fa;
            color: white;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 14px;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .links a {
            color: white;
            font-size: 24px;
            transition: 0.3s;
        }

        .links a:hover {
            color: #0096fa;
        }

        .stats-img {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img class="avatar" src="https://github.com/aNother1332.png" alt="Avatar">
        <h1>aNother1332</h1>
        <p class="bio">热爱编程、持续学习、追求技术成长</p>

        <div class="section">
            <h2>📌 关于我</h2>
            <p style="color:#ddd; line-height:1.6">
                一名热爱编程的开发者，喜欢探索新技术、做项目、写代码。
                专注于后端、算法、工具开发，持续进步中。
            </p>
        </div>

        <div class="section">
            <h2>🛠 技术栈</h2>
            <div class="tags">
                <span class="tag">Java</span>
                <span class="tag">Python</span>
                <span class="tag">C++</span>
                <span class="tag">Git</span>
                <span class="tag">GitHub</span>
                <span class="tag">VS Code</span>
            </div>
        </div>

        <div class="section">
            <h2>📊 GitHub 状态</h2>
            <img class="stats-img" src="https://github-readme-stats.vercel.app/api?username=aNother1332&show_icons=true&theme=blue-green">
            <img class="stats-img" style="margin-top:10px" src="https://github-readme-streak-stats.herokuapp.com/?user=aNother1332&theme=blue-green">
        </div>

        <div class="links">
            <a href="https://github.com/aNother1332" target="_blank">🐱</a>
            <a href="mailto:your-email@qq.com">📧</a>
        </div>
    </div>

</body>
</html>
